name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: aquaops_test
          POSTGRES_USER: aquaops
          POSTGRES_PASSWORD: aquaops_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aquaops -d aquaops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_ENV: test
      AUTO_CREATE_TABLES: "false"
      DATABASE_URL: postgresql+psycopg://aquaops:aquaops_test_password@127.0.0.1:5432/aquaops_test
      TEST_DATABASE_URL: postgresql+psycopg://aquaops:aquaops_test_password@127.0.0.1:5432/aquaops_test
      POSTGRES_DB: aquaops_test
      POSTGRES_USER: aquaops
      POSTGRES_PASSWORD: aquaops_test_password
      AQUAOPS_IMAGE_TAG: ci-test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import time
          import psycopg

          for attempt in range(1, 31):
              try:
                  with psycopg.connect(
                      "postgresql://aquaops:aquaops_test_password@127.0.0.1:5432/aquaops_test",
                      connect_timeout=3,
                  ):
                      print(f"PostgreSQL ready on attempt {attempt}/30")
                      break
              except psycopg.OperationalError:
                  if attempt == 30:
                      raise
                  time.sleep(2)
          PY

      - name: Upgrade database through Alembic head
        run: alembic upgrade head

      - name: Check model and migration alignment
        run: alembic check

      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.prod.yml config >/dev/null

      - name: Lint
        run: ruff check .

      - name: Format check
        run: black --check .

      - name: Test
        run: pytest
