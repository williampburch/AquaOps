{% extends "base.html" %}

{% block content %}
  <section class="auth-layout">
    <form class="auth-panel" method="post" action="/register">
      <h2>Create account</h2>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username" type="text" autocomplete="username" required />
      </div>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-control"
          id="password"
          name="password"
          type="password"
          autocomplete="new-password"
          minlength="10"
          required
        />
      </div>
      <button class="btn btn-primary w-100" type="submit">Create account</button>
    </form>
  </section>
{% endblock %}
