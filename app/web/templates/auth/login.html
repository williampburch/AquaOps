{% extends "base.html" %}

{% block content %}
  <section class="auth-layout">
    <form class="auth-panel" method="post" action="/login">
      <div class="auth-brand">
        <span class="brand-mark logo-drop" aria-hidden="true">
          <span class="logo-wave"></span>
          <span class="logo-bars"></span>
        </span>
        <div>
          <strong>Aqua<span>Ops</span></strong>
          <small>Aquarium Tracking &amp; Operations</small>
        </div>
      </div>
      <h2>Sign in</h2>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-control"
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />
      </div>
      <button class="btn btn-primary w-100" type="submit">Sign in</button>
    </form>
  </section>
{% endblock %}
