<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} | AquaOps</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("aquaops-theme") || "light";
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const activeTheme = storedTheme === "system" ? systemTheme : storedTheme;
        document.documentElement.dataset.bsTheme = activeTheme;
        document.documentElement.dataset.themeChoice = storedTheme;
      })();
    </script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            AquaOps
            <small>aquarium tracker</small>
          </span>
        </a>
        <nav class="nav flex-column gap-1">
          <a class="nav-link {{ 'active' if active_nav == 'dashboard' else '' }}" href="/">Dashboard</a>
          <a class="nav-link {{ 'active' if active_nav == 'tanks' else '' }}" href="/tanks">Tanks</a>
          <a class="nav-link disabled" aria-disabled="true">Events</a>
          <a class="nav-link disabled" aria-disabled="true">Reports</a>
        </nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow mb-1">Aquarium operations</p>
            <h1 class="page-title mb-0">{{ title }}</h1>
          </div>
          <div class="topbar-actions">
            <div class="theme-switcher" role="group" aria-label="Theme">
              <button class="theme-option" type="button" data-theme-value="light" title="Light theme" aria-label="Light theme">
                <span class="theme-icon theme-icon-light" aria-hidden="true"></span>
              </button>
              <button class="theme-option" type="button" data-theme-value="system" title="Use system theme" aria-label="Use system theme">
                <span class="theme-icon theme-icon-system" aria-hidden="true"></span>
              </button>
              <button class="theme-option" type="button" data-theme-value="dark" title="Dark theme" aria-label="Dark theme">
                <span class="theme-icon theme-icon-dark" aria-hidden="true"></span>
              </button>
            </div>
            {% if current_user %}
              <span class="user-chip">{{ current_user.username }}</span>
              <form method="post" action="/logout">
                <button class="btn btn-outline-light btn-sm" type="submit">Sign out</button>
              </form>
            {% else %}
              <a class="btn btn-outline-light btn-sm" href="/login">Sign in</a>
              <a class="btn btn-primary btn-sm" href="/register">Create account</a>
            {% endif %}
          </div>
        </header>

        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (() => {
        const buttons = document.querySelectorAll("[data-theme-value]");
        const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

        const applyTheme = (choice) => {
          const activeTheme = choice === "system" ? (mediaQuery.matches ? "dark" : "light") : choice;
          document.documentElement.dataset.bsTheme = activeTheme;
          document.documentElement.dataset.themeChoice = choice;
          localStorage.setItem("aquaops-theme", choice);
          buttons.forEach((button) => {
            button.classList.toggle("active", button.dataset.themeValue === choice);
          });
          window.dispatchEvent(new CustomEvent("aquaops:theme-change", { detail: { activeTheme } }));
        };

        buttons.forEach((button) => {
          button.addEventListener("click", () => applyTheme(button.dataset.themeValue));
        });
        mediaQuery.addEventListener("change", () => {
          if ((localStorage.getItem("aquaops-theme") || "light") === "system") {
            applyTheme("system");
          }
        });
        applyTheme(localStorage.getItem("aquaops-theme") || "light");
      })();
    </script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
