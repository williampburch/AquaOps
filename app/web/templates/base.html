<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} | AquaOps</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="/">
          <span class="brand-mark"></span>
          <span>AquaOps</span>
        </a>
        <nav class="nav flex-column gap-1">
          <a class="nav-link active" href="/">Dashboard</a>
          <a class="nav-link disabled" aria-disabled="true">Tanks</a>
          <a class="nav-link disabled" aria-disabled="true">Events</a>
          <a class="nav-link disabled" aria-disabled="true">Reports</a>
        </nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow mb-1">Aquarium operations</p>
            <h1 class="page-title mb-0">{{ title }}</h1>
          </div>
          <div class="d-flex align-items-center gap-2">
            {% if current_user %}
              <span class="user-chip">{{ current_user.username }}</span>
              <form method="post" action="/logout">
                <button class="btn btn-outline-light btn-sm" type="submit">Sign out</button>
              </form>
            {% else %}
              <a class="btn btn-outline-light btn-sm" href="/login">Sign in</a>
              <a class="btn btn-primary btn-sm" href="/register">Create account</a>
            {% endif %}
          </div>
        </header>

        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
