<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#073b4c" />
    <title>Connection needed | AquaOps</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { align-items: center; background: radial-gradient(circle at 80% 0%, #0d6070 0, #07303f 30%, #06151d 72%); color: #f4fbfc; display: flex; min-height: 100vh; margin: 0; padding: 1.25rem; }
      main { background: rgba(6, 28, 38, .88); border: 1px solid rgba(72, 218, 214, .3); border-radius: 1.5rem; box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, .35); margin: auto; max-width: 34rem; padding: clamp(1.5rem, 6vw, 3rem); text-align: center; }
      img { border-radius: 1.4rem; height: 5.5rem; margin-bottom: 1rem; width: 5.5rem; }
      span { color: #63e6df; font-size: .76rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
      h1 { font-size: clamp(1.8rem, 8vw, 2.7rem); line-height: 1.05; margin: .7rem 0 1rem; }
      p { color: #bdd1d6; line-height: 1.6; margin: 0 auto 1.5rem; }
      button { background: linear-gradient(135deg, #29d3cd, #34b9eb); border: 0; border-radius: .85rem; color: #03212a; cursor: pointer; font: inherit; font-weight: 800; min-height: 3rem; padding: .75rem 1.2rem; width: 100%; }
    </style>
  </head>
  <body>
    <main>
      <img src="/static/brand/aquaops-icon-192.png" alt="" />
      <span>AquaOps is still installed</span>
      <h1>Reconnect to load your aquarium.</h1>
      <p>AquaOps does not store private care pages offline. Check your connection, then try again. Anything already saved remains safely on the server.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
